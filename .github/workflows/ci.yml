name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests on python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so check_tdd_commits.py can audit

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Pin Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright src/

      - name: Unit tests with coverage
        run: uv run pytest tests/ --cov=data_analyst_mcp --cov-branch --cov-report=term-missing --cov-fail-under=90

      - name: TDD discipline check
        run: uv run python scripts/check_tdd_commits.py

      - name: Server boot smoke
        run: timeout 10 uv run data-analyst-mcp < /dev/null || [ $? -eq 124 ] || [ $? -eq 0 ]

      - name: Evals
        run: |
          if [ -d evals ] && find evals -name 'eval_*.py' | grep -q .; then
            uv run pytest evals/
          else
            echo "no evals yet — skipping"
          fi
